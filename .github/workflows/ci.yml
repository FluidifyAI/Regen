name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: regen_test
          POSTGRES_USER: regen
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest
          args: --timeout=5m

      - name: Migrate
        working-directory: backend
        env:
          DATABASE_URL: postgres://regen:secret@localhost:5432/regen_test?sslmode=disable
        run: go run ./cmd/regen/... migrate

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgres://regen:secret@localhost:5432/regen_test?sslmode=disable
        run: go test ./...

      - name: Build
        working-directory: backend
        run: go build ./cmd/regen/...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          push: false
          tags: ghcr.io/fluidifyai/regen:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
