name: Security Audit

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * MON"
  workflow_dispatch:

jobs:
  go-audit:
    name: Go Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan Go dependencies
        working-directory: backend
        run: govulncheck ./...

  node-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Scan Node dependencies
        working-directory: frontend
        # Gate on production dependencies — those are what ship to users.
        # Dev/build-tooling advisories (vite, rollup, esbuild, …) are surfaced
        # below for visibility but don't fail the build; clear them via periodic
        # toolchain bumps (major-version upgrades, tracked separately).
        run: npm audit --omit=dev --audit-level=high
      - name: Dev dependency audit (non-blocking, visibility only)
        working-directory: frontend
        run: npm audit --audit-level=high || true

  secret-scan:
    name: Secret Scan (git history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets in git history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          only-verified: true
