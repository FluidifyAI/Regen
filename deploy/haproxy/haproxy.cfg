global
    log stdout format raw local0
    maxconn 1000

defaults
    log global
    mode tcp
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout check 2s

# ── Stats page ───────────────────────────────────────────────────────────────
# Visit http://localhost:7000 to see real-time connection counts and which
# node is currently primary.
frontend stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node

# ── Primary (read/write) — port 5432 ─────────────────────────────────────────
# HAProxy checks Patroni's REST API: GET /primary returns 200 only on the
# node that currently holds the leader lock. All writes go here.
frontend postgres_write
    bind *:5432
    default_backend patroni_primary

backend patroni_primary
    mode tcp
    option httpchk
    http-check send meth GET uri /primary
    http-check expect status 200
    # Check the Patroni REST API (port 8008), route traffic to PG port 5432
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-1 patroni-1:5432 check port 8008
    server patroni-2 patroni-2:5432 check port 8008

# ── Replicas (read-only) — port 5433 ─────────────────────────────────────────
# Route read-only queries to replicas. Falls back to the primary if no
# replica is available (GET /replica returns 200 on standbys only).
frontend postgres_read
    bind *:5433
    default_backend patroni_replicas

backend patroni_replicas
    mode tcp
    option httpchk
    http-check send meth GET uri /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-1 patroni-1:5432 check port 8008
    server patroni-2 patroni-2:5432 check port 8008
