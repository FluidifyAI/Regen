apiVersion: v2
name: fluidify-regen
description: Fluidify Regen — open-source incident management platform
type: application
version: 0.1.0
appVersion: "0.10.0"
keywords:
  - incident-management
  - on-call
  - alerting
home: https://github.com/FluidifyAI/Regen
sources:
  - https://github.com/FluidifyAI/Regen
maintainers:
  - name: Fluidify Contributors
dependencies:
  - name: postgresql
    version: ">=16.0.0 <20.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ">=21.0.0 <27.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
