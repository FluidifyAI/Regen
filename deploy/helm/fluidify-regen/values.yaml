## Number of replicas (used only when autoscaling.enabled=false)
replicaCount: 2

image:
  repository: ghcr.io/fluidify/regen
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  # readOnlyRootFilesystem enforced. SAML SP key/cert must be readable
  # at the path specified by SAML_CERT_FILE / SAML_KEY_FILE env vars —
  # mount them via a Kubernetes Secret volume (not written by the app).
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  # Required: set this to your hostname (e.g. incidents.myco.com)
  host: ""
  # PRODUCTION REQUIRED: set tls=true — SAML ACS and webhooks
  # transmit sensitive data that must be protected by TLS.
  tls: false
  tlsSecretName: ""
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Non-sensitive configuration
config:
  logLevel: info
  port: "8080"
  appEnv: production
  # corsAllowedOrigins — comma-separated list of allowed request origins.
  # Example: "https://incidents.myco.com,https://staging.myco.com"
  # Leave empty to default to http://localhost:3000 (dev only — always set in production).
  corsAllowedOrigins: ""
  samlBaseURL: ""
  samlAllowIdpInitiated: "false"
  teamsServiceURL: "https://smba.trafficmanager.net/amer/"
  slackAutoInviteUserIDs: ""

# Sensitive secrets — rendered into a Kubernetes Secret.
# Leave a value empty ("") to omit that env var entirely.
secrets:
  # Override auto-computed DATABASE_URL (leave empty to use bundled postgresql)
  databaseURL: ""
  # Override auto-computed REDIS_URL (leave empty to use bundled redis)
  redisURL: ""
  slackBotToken: ""
  slackSigningSecret: ""
  slackAppToken: ""
  openaiAPIKey: ""
  teamsAppID: ""
  teamsAppPassword: ""
  teamsTenantID: ""
  teamsTeamID: ""
  teamsBotUserID: ""
  samlIDPMetadataURL: ""
  samlEntityID: ""
  webhookSecret: ""

# Database migrations
# Set enabled: false when PostgreSQL is managed by the same Helm release (pre-install
# hook fires before the subchart DB is ready). The app runs migrations on startup
# automatically — this hook is an extra safety net for external DB deployments.
migrations:
  enabled: true

# Bitnami PostgreSQL subchart
postgresql:
  enabled: true
  auth:
    database: fluidify_regen
    username: fluidify_regen
    # PRODUCTION REQUIRED: never deploy with 'changeme' — set a strong password
    password: changeme

# Bitnami Redis subchart
redis:
  enabled: true
  architecture: standalone
  auth:
    # PRODUCTION REQUIRED: set enabled=true and provide a password
    enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
