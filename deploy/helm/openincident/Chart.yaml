apiVersion: v2
name: fluidify-alert
description: Fluidify Alert — open-source incident management platform
type: application
version: 0.1.0
appVersion: "0.9.0"
keywords:
  - incident-management
  - on-call
  - alerting
home: https://github.com/openincident/openincident
sources:
  - https://github.com/openincident/openincident
maintainers:
  - name: Fluidify Contributors
dependencies:
  - name: postgresql
    version: ">=16.0.0 <20.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ">=21.0.0 <27.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
