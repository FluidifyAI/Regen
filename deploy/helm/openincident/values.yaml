## Number of replicas (used only when autoscaling.enabled=false)
replicaCount: 2

image:
  repository: ghcr.io/openincident/openincident
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Non-sensitive configuration
config:
  logLevel: info
  port: "8080"
  appEnv: production
  samlBaseURL: ""
  samlAllowIdpInitiated: "false"
  teamsServiceURL: "https://smba.trafficmanager.net/amer/"
  slackAutoInviteUserIDs: ""

# Sensitive secrets — rendered into a Kubernetes Secret.
# Leave a value empty ("") to omit that env var entirely.
secrets:
  # Override auto-computed DATABASE_URL (leave empty to use bundled postgresql)
  databaseURL: ""
  # Override auto-computed REDIS_URL (leave empty to use bundled redis)
  redisURL: ""
  slackBotToken: ""
  slackSigningSecret: ""
  slackAppToken: ""
  openaiAPIKey: ""
  teamsAppID: ""
  teamsAppPassword: ""
  teamsTenantID: ""
  teamsTeamID: ""
  teamsBotUserID: ""
  samlIDPMetadataURL: ""
  samlEntityID: ""
  webhookSecret: ""

# Bitnami PostgreSQL subchart
postgresql:
  enabled: true
  auth:
    database: openincident
    username: openincident
    # IMPORTANT: change this in production
    password: changeme

# Bitnami Redis subchart
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
