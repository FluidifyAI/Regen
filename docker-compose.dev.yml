# Development stack — Air hot-reload backend + nginx frontend + optional SAML mock
#
# Usage:
#   make dev          → starts this stack + Vite locally (best for active development)
#   make dev-docker   → starts this stack only (nginx frontend, no local Node required)
#
# Do NOT use this file in production. See docker-compose.yml for the production setup.

services:
  db:
    image: postgres:15-alpine
    container_name: fluidify-regen-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regen}
      POSTGRES_USER: ${POSTGRES_USER:-regen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluidify-regen-dev

  redis:
    image: redis:7-alpine
    container_name: fluidify-regen-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluidify-regen-dev

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fluidify-regen-api-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-regen}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-regen}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TEAMS_APP_ID=${TEAMS_APP_ID:-}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD:-}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID:-}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID:-}
      - TEAMS_BOT_USER_ID=${TEAMS_BOT_USER_ID:-}
      - TEAMS_SERVICE_URL=${TEAMS_SERVICE_URL:-https://smba.trafficmanager.net/amer/}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL:-}
      - SAML_BASE_URL=${SAML_BASE_URL:-http://localhost:8080}
      - SAML_ENTITY_ID=${SAML_ENTITY_ID:-}
      - SAML_CERT_FILE=${SAML_CERT_FILE:-}
      - SAML_KEY_FILE=${SAML_KEY_FILE:-}
      - SAML_ALLOW_IDP_INITIATED=${SAML_ALLOW_IDP_INITIATED:-false}
      - SAML_REDIRECT_URL=${SAML_REDIRECT_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluidify-regen-dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fluidify-regen-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - fluidify-regen-dev

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  fluidify-regen-dev:
    driver: bridge
