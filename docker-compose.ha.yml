# docker-compose.ha.yml — OPE-55 / OPE-56
#
# High-availability stack for local validation.
#
# PostgreSQL HA:
#   etcd (DCS) + Patroni on 2 nodes + HAProxy
#   - Patroni handles automatic primary election and failover
#   - HAProxy health-checks Patroni's REST API (/primary, /replica)
#     and routes connections to the current primary automatically —
#     no manual intervention needed when a node goes down
#   - Stats page: http://localhost:7000 (shows live primary/replica state)
#
# Redis HA:
#   redis-primary + redis-replica + 3 Sentinels (quorum=2)
#   - Sentinel promotes the replica automatically when primary is unreachable
#   - App connects via REDIS_SENTINEL_ADDRS; go-redis handles reconnect
#
# Connection topology:
#
#   App ──► HAProxy:5432 ──► patroni-{1,2}:5432  (writes → current primary)
#   App ──► HAProxy:5433 ──► patroni-{1,2}:5432  (reads  → current replicas)
#
#   App ──► Sentinel×3 ──► redis-primary:6379     (promoted automatically)
#
# Usage:
#   docker-compose -f docker-compose.ha.yml up -d
#   make ha-up
#
# Chaos tests:
#   bash scripts/chaos/db-kill.sh DB_CONTAINER=fluidify-ha-patroni-1
#   bash scripts/chaos/redis-kill.sh REDIS_CONTAINER=fluidify-ha-redis-primary

services:

  # ── etcd — Patroni's distributed configuration store ─────────────────────────
  # Single node for local testing. In production run 3 or 5 etcd nodes.
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: fluidify-ha-etcd
    restart: unless-stopped
    environment:
      ETCD_NAME: etcd0
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_TOKEN: fluidify-ha
      ETCD_INITIAL_CLUSTER_STATE: new
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [etcd]

  # ── Patroni node 1 ────────────────────────────────────────────────────────────
  # First to start becomes the primary (wins the etcd leader lock).
  patroni-1:
    build:
      context: ./deploy/patroni
      dockerfile: Dockerfile
    container_name: fluidify-ha-patroni-1
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres_secret}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator_secret}
      PATRONI_REWIND_PASSWORD: ${PATRONI_REWIND_PASSWORD:-rewind_secret}
    volumes:
      - patroni1_data:/var/lib/postgresql/data
      - ./deploy/patroni/patroni1.yml:/etc/patroni/patroni.yml:ro
      - ./deploy/patroni/post_bootstrap.sh:/etc/patroni/post_bootstrap.sh:ro
    ports:
      - "8008:8008"    # Patroni REST API (curl http://localhost:8008/primary)
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30
    networks:
      fluidify-ha:
        aliases: [patroni-1]

  # ── Patroni node 2 ────────────────────────────────────────────────────────────
  # Starts as a replica. Promoted automatically if node 1 goes down.
  patroni-2:
    build:
      context: ./deploy/patroni
      dockerfile: Dockerfile
    container_name: fluidify-ha-patroni-2
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres_secret}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator_secret}
      PATRONI_REWIND_PASSWORD: ${PATRONI_REWIND_PASSWORD:-rewind_secret}
    volumes:
      - patroni2_data:/var/lib/postgresql/data
      - ./deploy/patroni/patroni2.yml:/etc/patroni/patroni.yml:ro
      - ./deploy/patroni/post_bootstrap.sh:/etc/patroni/post_bootstrap.sh:ro
    ports:
      - "8009:8008"    # Patroni REST API for node 2
    depends_on:
      etcd:
        condition: service_healthy
      patroni-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30
    networks:
      fluidify-ha:
        aliases: [patroni-2]

  # ── HAProxy — automatic primary routing ──────────────────────────────────────
  # Polls Patroni REST API every 3 s. Routes port 5432 → current primary,
  # port 5433 → current replicas. Stats at http://localhost:7000.
  haproxy:
    image: haproxy:2.8-alpine
    container_name: fluidify-ha-haproxy
    restart: unless-stopped
    volumes:
      - ./deploy/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5432:5432"    # writes → primary
      - "5433:5433"    # reads  → replicas
      - "7000:7000"    # HAProxy stats page
    depends_on:
      patroni-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7000/ || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [haproxy]

  # ── Redis primary ─────────────────────────────────────────────────────────────
  redis-primary:
    image: redis:7-alpine
    container_name: fluidify-ha-redis-primary
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_primary_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [redis-primary]

  # ── Redis replica ─────────────────────────────────────────────────────────────
  redis-replica:
    image: redis:7-alpine
    container_name: fluidify-ha-redis-replica
    restart: unless-stopped
    command: redis-server --appendonly yes --replicaof redis-primary 6379
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [redis-replica]

  # ── Redis Sentinel 1 ──────────────────────────────────────────────────────────
  sentinel-1:
    image: redis:7-alpine
    container_name: fluidify-ha-sentinel-1
    restart: unless-stopped
    command: sh -c 'echo "sentinel resolve-hostnames yes" > /tmp/sentinel.conf; echo "sentinel announce-hostnames yes" >> /tmp/sentinel.conf; echo "sentinel monitor mymaster redis-primary 6379 2" >> /tmp/sentinel.conf; echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf; echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf; echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf; echo "bind 0.0.0.0" >> /tmp/sentinel.conf; echo "port 26379" >> /tmp/sentinel.conf; exec redis-sentinel /tmp/sentinel.conf'
    ports:
      - "26379:26379"
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      fluidify-ha:
        aliases: [sentinel-1]

  # ── Redis Sentinel 2 ──────────────────────────────────────────────────────────
  sentinel-2:
    image: redis:7-alpine
    container_name: fluidify-ha-sentinel-2
    restart: unless-stopped
    command: sh -c 'echo "sentinel resolve-hostnames yes" > /tmp/sentinel.conf; echo "sentinel announce-hostnames yes" >> /tmp/sentinel.conf; echo "sentinel monitor mymaster redis-primary 6379 2" >> /tmp/sentinel.conf; echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf; echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf; echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf; echo "bind 0.0.0.0" >> /tmp/sentinel.conf; echo "port 26379" >> /tmp/sentinel.conf; exec redis-sentinel /tmp/sentinel.conf'
    ports:
      - "26380:26379"
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      fluidify-ha:
        aliases: [sentinel-2]

  # ── Redis Sentinel 3 ──────────────────────────────────────────────────────────
  sentinel-3:
    image: redis:7-alpine
    container_name: fluidify-ha-sentinel-3
    restart: unless-stopped
    command: sh -c 'echo "sentinel resolve-hostnames yes" > /tmp/sentinel.conf; echo "sentinel announce-hostnames yes" >> /tmp/sentinel.conf; echo "sentinel monitor mymaster redis-primary 6379 2" >> /tmp/sentinel.conf; echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf; echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf; echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf; echo "bind 0.0.0.0" >> /tmp/sentinel.conf; echo "port 26379" >> /tmp/sentinel.conf; exec redis-sentinel /tmp/sentinel.conf'
    ports:
      - "26381:26379"
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      fluidify-ha:
        aliases: [sentinel-3]

  # ── Regen API (wired to HA stack) ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fluidify-ha-api
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=${API_PORT:-8080}
      # Connect via HAProxy — automatically follows primary after failover
      - DATABASE_URL=postgresql://${POSTGRES_USER:-regen}:${POSTGRES_PASSWORD:-secret}@haproxy:5432/${POSTGRES_DB:-regen}?sslmode=disable
      # Redis Sentinel — go-redis resolves current master via Sentinel
      - REDIS_URL=redis://redis-primary:6379
      - REDIS_SENTINEL_ADDRS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_SENTINEL_MASTER=mymaster
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TEAMS_APP_ID=${TEAMS_APP_ID}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID}
      - TEAMS_BOT_USER_ID=${TEAMS_BOT_USER_ID}
      - TEAMS_SERVICE_URL=${TEAMS_SERVICE_URL:-https://smba.trafficmanager.net/amer/}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL}
      - SAML_BASE_URL=${SAML_BASE_URL:-http://localhost:8080}
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      haproxy:
        condition: service_started
      redis-primary:
        condition: service_healthy
      sentinel-1:
        condition: service_started
    networks:
      - fluidify-ha

volumes:
  etcd_data:
  patroni1_data:
  patroni2_data:
  redis_primary_data:
  redis_replica_data:
  go_modules:

networks:
  fluidify-ha:
    driver: bridge
