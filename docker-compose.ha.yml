# docker-compose.ha.yml — OPE-55 / OPE-56
#
# High-availability stack for local validation.
# Extends the base docker-compose.yml with:
#   - PostgreSQL primary + streaming replica + PgBouncer
#   - Redis Sentinel (3 sentinels watching 1 primary + 1 replica)
#
# Usage:
#   docker-compose -f docker-compose.ha.yml up -d
#
# After startup, run the chaos tests to validate failover:
#   bash scripts/chaos/db-kill.sh DB_CONTAINER=fluidify-ha-pg-primary
#   bash scripts/chaos/redis-kill.sh REDIS_CONTAINER=fluidify-ha-redis-primary
#
# Connection topology:
#
#   App → PgBouncer:5432 → pg-primary:5432 (writes + reads)
#                        → pg-replica:5432 (replica, promoted on failover)
#
#   App → Sentinel:26379/26380/26381 → redis-primary:6379 (writes)
#                                     → redis-replica:6379 (reads, promoted on failover)

services:

  # ── PostgreSQL primary ───────────────────────────────────────────────────────
  pg-primary:
    image: postgres:15-alpine
    container_name: fluidify-ha-pg-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regen}
      POSTGRES_USER: ${POSTGRES_USER:-regen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # Enable WAL streaming so the replica can follow
      POSTGRES_INITDB_ARGS: "--wal-segsize=16"
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=3
        -c wal_keep_size=128
        -c hot_standby=on
        -c synchronous_commit=on
        -c listen_addresses='*'
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regen}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [pg-primary]

  # ── PostgreSQL streaming replica ─────────────────────────────────────────────
  pg-replica:
    image: postgres:15-alpine
    container_name: fluidify-ha-pg-replica
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      PGPASSWORD: ${POSTGRES_PASSWORD:-secret}
    # Bootstrap from the primary using pg_basebackup, then run in hot_standby mode
    command: >
      sh -c "
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          echo 'Bootstrapping replica from primary...'
          until pg_isready -h pg-primary -U ${POSTGRES_USER:-regen}; do sleep 1; done
          pg_basebackup -h pg-primary -U ${POSTGRES_USER:-regen} -D /var/lib/postgresql/data -P -Xs -R
          echo 'Replica bootstrap complete.'
        fi
        exec postgres -c hot_standby=on
      "
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regen}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [pg-replica]

  # ── PgBouncer — connection pooler ────────────────────────────────────────────
  # Routes all connections to pg-primary. In a real HA setup, update
  # pgbouncer.ini to point at the new primary after failover. For automatic
  # failover use Patroni + HAProxy instead.
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: fluidify-ha-pgbouncer
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: pg-primary
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-regen}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-regen}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      PGBOUNCER_DATABASE: ${POSTGRES_DB:-regen}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "5433:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-regen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      fluidify-ha:
        aliases: [pgbouncer]

  # ── Redis primary ─────────────────────────────────────────────────────────────
  redis-primary:
    image: redis:7-alpine
    container_name: fluidify-ha-redis-primary
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_primary_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [redis-primary]

  # ── Redis replica ─────────────────────────────────────────────────────────────
  redis-replica:
    image: redis:7-alpine
    container_name: fluidify-ha-redis-replica
    restart: unless-stopped
    command: redis-server --appendonly yes --replicaof redis-primary 6379
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      fluidify-ha:
        aliases: [redis-replica]

  # ── Redis Sentinel 1 ──────────────────────────────────────────────────────────
  sentinel-1:
    image: redis:7-alpine
    container_name: fluidify-ha-sentinel-1
    restart: unless-stopped
    command: >
      sh -c "
        cat > /tmp/sentinel.conf << 'EOF'
      sentinel monitor mymaster redis-primary 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      bind 0.0.0.0
      port 26379
      EOF
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26379:26379"
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      fluidify-ha:
        aliases: [sentinel-1]

  # ── Redis Sentinel 2 ──────────────────────────────────────────────────────────
  sentinel-2:
    image: redis:7-alpine
    container_name: fluidify-ha-sentinel-2
    restart: unless-stopped
    command: >
      sh -c "
        cat > /tmp/sentinel.conf << 'EOF'
      sentinel monitor mymaster redis-primary 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      bind 0.0.0.0
      port 26379
      EOF
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26380:26379"
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      fluidify-ha:
        aliases: [sentinel-2]

  # ── Redis Sentinel 3 ──────────────────────────────────────────────────────────
  sentinel-3:
    image: redis:7-alpine
    container_name: fluidify-ha-sentinel-3
    restart: unless-stopped
    command: >
      sh -c "
        cat > /tmp/sentinel.conf << 'EOF'
      sentinel monitor mymaster redis-primary 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      bind 0.0.0.0
      port 26379
      EOF
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26381:26379"
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      fluidify-ha:
        aliases: [sentinel-3]

  # ── Regen API (wired to HA stack) ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fluidify-ha-api
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=${API_PORT:-8080}
      # Connect via PgBouncer (port 5433 on host, 5432 inside the network)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-regen}:${POSTGRES_PASSWORD:-secret}@pgbouncer:5432/${POSTGRES_DB:-regen}?sslmode=disable
      # Redis Sentinel — app will connect via Sentinel, no direct Redis URL needed
      - REDIS_URL=redis://redis-primary:6379
      - REDIS_SENTINEL_ADDRS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_SENTINEL_MASTER=mymaster
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TEAMS_APP_ID=${TEAMS_APP_ID}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID}
      - TEAMS_BOT_USER_ID=${TEAMS_BOT_USER_ID}
      - TEAMS_SERVICE_URL=${TEAMS_SERVICE_URL:-https://smba.trafficmanager.net/amer/}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL}
      - SAML_BASE_URL=${SAML_BASE_URL:-http://localhost:8080}
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
      sentinel-1:
        condition: service_started
    networks:
      - fluidify-ha

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_primary_data:
  redis_replica_data:
  go_modules:

networks:
  fluidify-ha:
    driver: bridge
