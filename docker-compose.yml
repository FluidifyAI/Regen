services:
  db:
    image: postgres:15-alpine
    container_name: openincident-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openincident}
      POSTGRES_USER: ${POSTGRES_USER:-openincident}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openincident}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openincident

  redis:
    image: redis:7-alpine
    container_name: openincident-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openincident

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: openincident-api
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=${API_PORT:-8080}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-openincident}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-openincident}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TEAMS_APP_ID=${TEAMS_APP_ID}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID}
      - TEAMS_BOT_USER_ID=${TEAMS_BOT_USER_ID}
      - TEAMS_SERVICE_URL=${TEAMS_SERVICE_URL:-https://smba.trafficmanager.net/amer/}
      # CORS â€” only needed for split-origin deployments (CDN + separate API domain).
      # In development all http://localhost:* origins are allowed automatically.
      # In production with the embedded frontend (same-origin) this is not needed.
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      # SAML SSO (optional â€” leave unset to run in open mode)
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL}
      - SAML_BASE_URL=${SAML_BASE_URL:-http://localhost:8080}
      - SAML_ENTITY_ID=${SAML_ENTITY_ID}
      - SAML_CERT_FILE=${SAML_CERT_FILE}
      - SAML_KEY_FILE=${SAML_KEY_FILE}
      - SAML_ALLOW_IDP_INITIATED=${SAML_ALLOW_IDP_INITIATED:-false}
      - SAML_REDIRECT_URL=${SAML_REDIRECT_URL}
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - openincident

  # mock-idp + saml-proxy: Local SAML IdP for SSO development/testing.
  # Test credentials: user1 / user1pass  (email: user1@example.com)
  #                   user2 / user2pass  (email: user2@example.com)
  #
  # saml-proxy (nginx) rewrites the Host header to localhost:8082 so SimpleSAMLphp
  # advertises SSO URLs the browser can reach. Without it, SimpleSAMLphp would use
  # the Docker-internal hostname "mock-idp" which browsers cannot resolve.
  mock-idp:
    image: kristophjunge/test-saml-idp
    container_name: openincident-mock-idp
    environment:
      - SIMPLESAMLPHP_SP_ENTITY_ID=http://localhost:8080/saml/metadata
      - SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE=http://localhost:8080/saml/acs
    networks:
      - openincident

  saml-proxy:
    image: nginx:alpine
    container_name: openincident-saml-proxy
    ports:
      - "8082:80"
    volumes:
      - ./scripts/saml-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mock-idp
    networks:
      - openincident

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  go_modules:
    driver: local

networks:
  openincident:
    driver: bridge
