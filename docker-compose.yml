services:
  db:
    image: postgres:15-alpine
    container_name: openincident-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openincident}
      POSTGRES_USER: ${POSTGRES_USER:-openincident}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openincident}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openincident

  redis:
    image: redis:7-alpine
    container_name: openincident-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openincident

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: openincident-api
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=${API_PORT:-8080}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-openincident}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-openincident}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_AUTO_INVITE_USER_IDS=${SLACK_AUTO_INVITE_USER_IDS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TEAMS_APP_ID=${TEAMS_APP_ID}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID}
      - TEAMS_BOT_USER_ID=${TEAMS_BOT_USER_ID}
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - openincident

  # web:
  #   # Frontend service will be implemented in Epic-006
