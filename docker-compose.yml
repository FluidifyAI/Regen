services:
  db:
    image: postgres:15-alpine
    container_name: fluidify-regen-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regen}
      POSTGRES_USER: ${POSTGRES_USER:-regen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluidify-regen

  redis:
    image: redis:7-alpine
    container_name: fluidify-regen-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluidify-regen

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluidify-regen
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-regen}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-regen}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TEAMS_APP_ID=${TEAMS_APP_ID:-}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD:-}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID:-}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID:-}
      - TEAMS_BOT_USER_ID=${TEAMS_BOT_USER_ID:-}
      - TEAMS_SERVICE_URL=${TEAMS_SERVICE_URL:-https://smba.trafficmanager.net/amer/}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL:-}
      - SAML_BASE_URL=${SAML_BASE_URL:-http://localhost:8080}
      - SAML_ENTITY_ID=${SAML_ENTITY_ID:-}
      - SAML_CERT_FILE=${SAML_CERT_FILE:-}
      - SAML_KEY_FILE=${SAML_KEY_FILE:-}
      - SAML_ALLOW_IDP_INITIATED=${SAML_ALLOW_IDP_INITIATED:-false}
      - SAML_REDIRECT_URL=${SAML_REDIRECT_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluidify-regen

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  fluidify-regen:
    driver: bridge
