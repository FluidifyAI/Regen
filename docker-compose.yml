  #     - node_modules:/app/node_modules
  #   ports:
  #     - "${WEB_PORT:-3000}:3000"
  #   depends_on:
  #     - api
  #   networks:
  #     - openincident

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  go_modules:
    driver: local
  node_modules:
    driver: local

networks:
  openincident:
    driver: bridge
