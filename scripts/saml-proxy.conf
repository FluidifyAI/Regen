server {
    listen 80;

    # Proxy all requests to the mock IdP, but tell it that its base URL
    # is http://localhost:8082/ (the host-exposed port).
    # This causes SimpleSAMLphp to advertise SSO endpoint URLs with
    # localhost:8082, which the browser can reach — rather than the
    # Docker-internal service name "mock-idp" which browsers cannot.
    location / {
        proxy_pass http://mock-idp:8080;
        proxy_set_header Host "localhost:8082";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
