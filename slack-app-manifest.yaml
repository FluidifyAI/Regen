# Fluidify Regen — Slack App Manifest
#
# How to use:
#   1. Replace YOUR-INSTANCE below with your Regen URL (e.g. https://regen.example.com)
#   2. Go to https://api.slack.com/apps
#   3. Click "Create New App" → "From a manifest"
#   4. Select your workspace
#   5. Paste this entire file (YAML tab) and click Next → Create
#   6. From "Basic Information", copy:
#        - Signing Secret  → paste into Regen Settings → Integrations → Slack
#   7. From "OAuth & Permissions" → Install to Workspace, then copy:
#        - Bot User OAuth Token (xoxb-...)  → paste into Regen Settings → Integrations → Slack
#
# Full setup guide: https://github.com/FluidifyAI/Regen/blob/main/README.md

_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Fluidify Regen
  description: Incident management — create, acknowledge, and resolve incidents without leaving Slack.
  background_color: "#1800ad"
  long_description: |
    Fluidify Regen brings your full incident lifecycle into Slack.

    When an alert fires, Regen automatically creates a dedicated incident channel,
    posts a status card, and keeps your timeline in sync as the team responds.

    Use /incident to declare incidents, assign commanders, add timeline notes, and
    resolve — all without switching tools.

    Self-hosted. Open source. No per-seat fees.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false

  bot_user:
    display_name: Fluidify Regen
    always_online: true

  slash_commands:
    - command: /incident
      url: https://YOUR-INSTANCE/api/v1/slack/commands
      description: Manage incidents — new, ack, resolve, status, note, lead, list
      usage_hint: "new [title] | ack | resolve | status | note [text] | lead [me|@user] | list | help"
      should_escape: false

oauth_config:
  redirect_urls:
    - https://YOUR-INSTANCE/api/v1/auth/slack/callback
  scopes:
    bot:
      - channels:manage       # Create and archive incident channels
      - channels:read         # List channels (duplicate prevention)
      - channels:history      # Read channel messages → timeline sync
      - chat:write            # Post messages and status updates
      - chat:write.public     # Post to public channels without joining
      - users:read            # Resolve user display names for timeline
      - users:read.email      # Email lookup for Slack → Regen account linking
      - im:write              # Send DMs to on-call responders
      - app_mentions:read     # Required for app_mention events (@regen bot)
      - reactions:read        # Required for reaction_added events (✅ ack, 🔴 resolve)
    user:
      - openid                # Slack SSO login
      - email                 # Match Slack user to Regen account
      - profile               # Display name for login

settings:
  event_subscriptions:
    request_url: https://YOUR-INSTANCE/api/v1/slack/events
    bot_events:
      - message.channels      # Sync channel messages → incident timeline
      - app_mention           # @regen bot mentions → AI answer in thread
      - reaction_added        # ✅ white_check_mark → ack, 🔴 red_circle → resolve

  interactivity:
    is_enabled: true
    request_url: https://YOUR-INSTANCE/api/v1/slack/interactions

  org_deploy_enabled: false
  socket_mode_enabled: false  # HTTP Events API — no WebSocket connection required
  token_rotation_enabled: false
